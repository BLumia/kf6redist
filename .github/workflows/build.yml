name: Cross-Platform CI
run-name: KDE Framework - Qt ${{ inputs.qt_ver || 'default' }} - KF ${{ inputs.kf_ver || 'default' }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      qt_ver:
        description: 'Qt Version to use'
        required: false
        default: '6.10.3'
      kf_ver:
        description: 'KF Version to use'
        required: true
        default: 'v6.26.0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-26]
        include:
          - os: windows-2022
            qt_arch: win64_msvc2022_64
            os_label: win
            msvc_arch: x64
            vs_ver: 2022
          - os: macos-26
            qt_arch: clang_64
            os_label: mac
            msvc_arch: arm64 # only for upload-artifact's name
            vs_ver: 0

    env:
      QT_VER: ${{ inputs.qt_ver || '6.10.3' }}
      KF_VER: ${{ inputs.kf_ver || 'v6.26.0' }}
      AQT_ARCH: ${{ matrix.qt_arch }}
      MSVC_ARCH: ${{ matrix.msvc_arch }}
      VS_VER: ${{ matrix.vs_ver }}

    steps:
    - uses: actions/checkout@v6
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        arch: ${{ env.AQT_ARCH }}
        version: ${{ env.QT_VER }}
        cache: true

    - name: Install Gettext (Windows)
      if: runner.os == 'Windows'
      uses: MinoruSekine/setup-scoop@v4.0.2
      with:
        buckets: extras
        apps: gettext ninja

    - name: CMake prefer Ninja (address weird syntax-highlighting linking failure)
      run: |
        Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_GENERATOR=Ninja"

    - name: Install Gettext (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install gettext ninja

    - name: Enable long paths for Windows
      if: runner.os == 'Windows'
      run: |
        New-ItemProperty -Path "HKLM:System\CurrentControlSet\Control\FileSystem" `
          -Name "LongPathsEnabled" -Value 1 -Type DWORD -Force

    - name: Prepare relocatable RPATH toolchain (macOS)
      if: runner.os == 'macOS'
      run: |
        $content = @"
        set(CMAKE_MACOSX_RPATH ON CACHE BOOL "" FORCE)
        set(CMAKE_INSTALL_NAME_DIR "@rpath" CACHE STRING "" FORCE)
        set(CMAKE_INSTALL_RPATH "@loader_path/../lib;@loader_path/../../lib;@loader_path/../../../lib" CACHE STRING "" FORCE)
        set(CMAKE_BUILD_WITH_INSTALL_RPATH ON CACHE BOOL "" FORCE)
        set(CMAKE_INSTALL_RPATH_USE_LINK_PATH OFF CACHE BOOL "" FORCE)
        "@
        $content | Set-Content -Path macos.cmake
        Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_TOOLCHAIN_FILE=$PWD/macos.cmake"

    - name: Build
      run: ./build.ps1 -kfver ${{ env.KF_VER }}

    - name: Fix RPath (macOS)
      if: runner.os == 'macOS'
      run: |
        $absPathPattern = "/Users/runner/work"
        $installDir = "$PWD/kf6redist-install"
        $binaries = Get-ChildItem -Path $installDir -Recurse | Where-Object { ! $_.PSIsContainer }
        foreach ($file in $binaries) {
          $fileType = (file $file.FullName)
          if ($fileType -match "Mach-O") {
            Write-Host "Fixing RPath for: $($file.FullName)"

            # Fix ID
            $id = (otool -D $file.FullName | Select-Object -Skip 1)
            if ($id -match $absPathPattern) {
              $newName = $id -replace "^.*/kf6redist-install/", "@rpath/"
              Write-Host "  Changing ID from $id to $newName"
              install_name_tool -id $newName $file.FullName
            }

            # Fix Dependencies
            $libraries = otool -L $file.FullName | Select-Object -Skip 1
            foreach ($libLine in $libraries) {
              if ($libLine -match "\s*(.*)\s\(compatibility.*$") {
                $libPath = $Matches[1].Trim()
                if ($libPath -match $absPathPattern) {
                  $newLibPath = $libPath -replace "^.*/kf6redist-install/", "@rpath/"
                  # Also handle Qt absolute paths if any, though they might be needed.
                  # For now, focus on our own redistribution.
                  if ($newLibPath -ne $libPath) {
                    Write-Host "  Changing dependency from $libPath to $newLibPath"
                    install_name_tool -change $libPath $newLibPath $file.FullName
                  }
                }
              }
            }

            # Fix RPaths
            $loadCommands = otool -l $file.FullName
            $isRpathBlock = $false
            foreach ($line in $loadCommands) {
              if ($line -match "cmd LC_RPATH") { $isRpathBlock = $true }
              elseif ($line -match "cmd ") { $isRpathBlock = $false }

              if ($isRpathBlock -and $line -match "\s*path\s+(.*)\s\(offset.*$") {
                $rpath = $Matches[1].Trim()
                if ($rpath -match $absPathPattern) {
                  Write-Host "  Removing absolute RPath: $rpath"
                  install_name_tool -delete_rpath $rpath $file.FullName
                }
              }
            }

            # Ensure relative RPaths exist
            install_name_tool -add_rpath "@loader_path/../lib" $file.FullName 2>$null
            install_name_tool -add_rpath "@loader_path/../../lib" $file.FullName 2>$null
            install_name_tool -add_rpath "@loader_path/../../../lib" $file.FullName 2>$null
          }
        }

    - name: Verify RPath (macOS)
      if: runner.os == 'macOS'
      run: |
        $absPathPattern = "/Users/runner/work"
        $installDir = "kf6redist-install"
        $binaries = Get-ChildItem -Path $installDir -Recurse | Where-Object { ! $_.PSIsContainer }
        foreach ($file in $binaries) {
          $fileType = (file $file.FullName)
          if ($fileType -match "Mach-O") {
            Write-Host "Checking RPath for: $($file.FullName)"
            # Skip the first line of otool output because it always contains the filename (absolute path)
            $otoolLoad = (otool -l $file.FullName | Select-Object -Skip 1)
            $otoolId = (otool -D $file.FullName | Select-Object -Skip 1)
            $badLines = ($otoolLoad | Where-Object { $_ -match $absPathPattern }) + ($otoolId | Where-Object { $_ -match $absPathPattern })
            if ($badLines) {
              Write-Host "Absolute path found in binary metadata: $($file.FullName)" -ForegroundColor Red
              Write-Host "Offending lines:" -ForegroundColor Red
              $badLines | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              $failBuild = $true
            }
          }
        }
        if ($failBuild) {
          Write-Error "RPath verification failed!"
          exit 1
        }
        Write-Host "RPath verification passed!" -ForegroundColor Green

    - uses: actions/upload-artifact@v7
      with:
        name: "${{ matrix.os_label }}-${{ env.MSVC_ARCH }}-vs${{ env.VS_VER }}-qt${{ env.QT_VER }}-kf${{ env.KF_VER }}"
        path: kf6redist-install/*