name: Cross-Platform CI
run-name: KDE Framework - Qt ${{ inputs.qt_ver || 'default' }} - KF ${{ inputs.kf_ver || 'default' }}

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      qt_ver:
        description: 'Qt Version to use'
        required: false
        default: '6.10.3'
      kf_ver:
        description: 'KF Version to use'
        required: true
        default: 'v6.26.0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-26]
        include:
          - os: windows-2022
            qt_arch: win64_msvc2022_64
            os_label: win
            msvc_arch: x64
            vs_ver: 2022
          - os: macos-26
            qt_arch: clang_64
            os_label: mac
            msvc_arch: arm64 # only for upload-artifact's name
            vs_ver: 0

    env:
      QT_VER: ${{ inputs.qt_ver || '6.10.3' }}
      KF_VER: ${{ inputs.kf_ver || 'v6.26.0' }}
      AQT_ARCH: ${{ matrix.qt_arch }}
      MSVC_ARCH: ${{ matrix.msvc_arch }}
      VS_VER: ${{ matrix.vs_ver }}

    steps:
    - uses: actions/checkout@v6
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        arch: ${{ env.AQT_ARCH }}
        version: ${{ env.QT_VER }}
        cache: true

    - name: Install Gettext and Ninja (Windows)
      if: runner.os == 'Windows'
      uses: MinoruSekine/setup-scoop@v4.0.2
      with:
        buckets: extras
        apps: gettext ninja

    - name: Install Gettext and Ninja (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install gettext ninja

    - name: CMake prefer Ninja
      run: |
        Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_GENERATOR=Ninja"

    - name: Enable long paths for Windows
      if: runner.os == 'Windows'
      run: |
        New-ItemProperty -Path "HKLM:System\CurrentControlSet\Control\FileSystem" `
          -Name "LongPathsEnabled" -Value 1 -Type DWORD -Force

    - name: Build
      run: ./build.ps1 -kfver ${{ env.KF_VER }}
      env:
        DYLD_LIBRARY_PATH: ${{ runner.os == 'macOS' && format('{0}/lib:kf6redist-install/lib', env.QT_ROOT_DIR) || '' }}
        DYLD_FRAMEWORK_PATH: ${{ runner.os == 'macOS' && format('{0}/lib', env.QT_ROOT_DIR) || '' }}

    - name: Verify rpath (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        errors=0
        while IFS= read -r -d '' f; do
          # Check LC_RPATH for absolute paths
          rpaths=$(otool -l "$f" | awk '/cmd LC_RPATH/{getline; getline; print}' || true)
          if echo "$rpaths" | grep -q 'path /'; then
            echo "::error file=$f::Absolute path found in LC_RPATH"
            echo "$rpaths" | grep 'path /' | sed 's/^/  /'
            errors=$((errors + 1))
          fi
          # Check LC_ID_DYLIB for absolute paths (only for .dylib)
          if [[ "$f" == *.dylib ]]; then
            id=$(otool -D "$f" 2>/dev/null | tail -n +2 | head -1 || true)
            if [[ "$id" == /* ]]; then
              echo "::error file=$f::Absolute path found in LC_ID_DYLIB: $id"
              errors=$((errors + 1))
            fi
          fi
        done < <(find kf6redist-install/lib -type f \( -name "*.dylib" -o -name "*.so" \) -print0)
        while IFS= read -r -d '' f; do
          rpaths=$(otool -l "$f" | awk '/cmd LC_RPATH/{getline; getline; print}' || true)
          if echo "$rpaths" | grep -q 'path /'; then
            echo "::error file=$f::Absolute path found in LC_RPATH"
            echo "$rpaths" | grep 'path /' | sed 's/^/  /'
            errors=$((errors + 1))
          fi
        done < <(find kf6redist-install/bin kf6redist-install/lib/libexec -type f -perm +111 -print0 2>/dev/null)
        if [ "$errors" -gt 0 ]; then
          echo "::error::Found $errors file(s) with absolute path rpath/install name issues"
          exit 1
        fi
        echo "rpath verification passed: no absolute paths found"

    - uses: actions/upload-artifact@v7
      with:
        name: "${{ matrix.os_label }}-${{ env.MSVC_ARCH }}-vs${{ env.VS_VER }}-qt${{ env.QT_VER }}-kf${{ env.KF_VER }}"
        path: kf6redist-install/*